<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus — Social Platform</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <!-- ============================================================
     AUTH SCREEN
     Shown when user is not logged in.
     Contains: brand logo, tab switcher, login form, register form
============================================================ -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <!-- Brand -->
        <div class="auth-brand">
          <div class="brand-icon">N</div>
          <h1 class="brand-name">Nexus</h1>
          <p class="brand-tagline">Where ideas connect.</p>
        </div>

        <!-- Tab switcher: Login / Register -->
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">Sign In</button>
          <button class="tab-btn" data-tab="register">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form" class="auth-form active">
          <div class="field-group">
            <label for="login-login">Username or Email</label>
            <input
              type="text"
              id="login-login"
              placeholder="you@example.com"
              autocomplete="username"
            />
          </div>
          <div class="field-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" class="auth-form">
          <div class="field-group">
            <label for="reg-username">Username</label>
            <input
              type="text"
              id="reg-username"
              placeholder="roman_dev"
              autocomplete="username"
            />
          </div>
          <div class="field-group">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>
          <div class="field-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Minimum 6 characters"
              autocomplete="new-password"
            />
          </div>
          <div id="register-error" class="form-error hidden"></div>
          <button type="submit" class="btn-primary btn-full">
            Create Account
          </button>
        </form>
      </div>
    </div>
    <!-- END AUTH SCREEN -->

    <!-- ============================================================
     APP SCREEN
     Shown when user is logged in.
     Contains: sidebar + main content area
============================================================ -->
    <div id="app-screen" class="screen">
      <!-- ── SIDEBAR ────────────────────────────────────────────── -->
      <aside class="sidebar">
        <!-- Logo -->
        <div class="sidebar-brand">
          <div class="brand-icon sm">N</div>
          <span class="brand-name">Nexus</span>
        </div>

        <!-- Navigation links -->
        <nav class="sidebar-nav">
          <a class="nav-item active" data-view="feed" href="#">
            <!-- Home icon -->
            <svg viewBox="0 0 24 24">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span>Feed</span>
          </a>

          <a class="nav-item" data-view="explore" href="#">
            <!-- Search icon -->
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Explore</span>
          </a>

          <a class="nav-item" data-view="profile-me" href="#">
            <!-- Person icon -->
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Profile</span>
          </a>
        </nav>

        <!-- User search -->
        <div class="sidebar-search">
          <input
            type="text"
            id="search-input"
            placeholder="Search users…"
            autocomplete="off"
          />
          <!-- Dropdown results injected here by JS -->
          <div id="search-results" class="search-dropdown hidden"></div>
        </div>

        <!-- Logged-in user info + logout -->
        <div class="sidebar-user">
          <!-- Avatar injected by JS -->
          <div class="avatar-sm" id="sidebar-avatar"></div>
          <div class="sidebar-user-info">
            <span id="sidebar-username" class="fw-600"></span>
            <button class="btn-ghost" id="logout-btn">Sign out</button>
          </div>
        </div>
      </aside>
      <!-- END SIDEBAR -->

      <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
      <main class="main-content">
        <!-- ── VIEW: FEED ──────────────────────────────────────── -->
        <div id="view-feed" class="view active">
          <div class="view-header">
            <h2>Your Feed</h2>
          </div>

          <!-- Compose new post -->
          <div class="compose-card">
            <div class="avatar-sm" id="compose-avatar"></div>
            <div class="compose-body">
              <textarea
                id="compose-text"
                placeholder="What's on your mind?"
                maxlength="500"
              ></textarea>

              <!-- Media URL input — NEW -->
              <div class="compose-media" id="compose-media-row">
                <input
                  type="url"
                  id="compose-media-url"
                  placeholder="Paste image or video URL (optional)…"
                />
                <!-- Live preview injected here by JS -->
                <div id="compose-media-preview"></div>
              </div>

              <div class="compose-footer">
                <span id="compose-count" class="char-count">0 / 500</span>
                <div class="compose-actions">
                  <button
                    id="compose-media-toggle"
                    class="btn-ghost btn-icon"
                    title="Add image or video"
                  >
                    <!-- Photo icon -->
                    <svg viewBox="0 0 24 24">
                      <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                      <circle cx="8.5" cy="8.5" r="1.5" />
                      <polyline points="21 15 16 10 5 21" />
                    </svg>
                  </button>
                  <button id="compose-submit" class="btn-primary" disabled>
                    Post
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Feed posts injected here by JS -->
          <div id="feed-posts" class="posts-list">
            <div class="loading-state">Loading your feed…</div>
          </div>
        </div>
        <!-- END VIEW: FEED -->

        <!-- ── VIEW: EXPLORE ───────────────────────────────────── -->
        <div id="view-explore" class="view">
          <div class="view-header">
            <h2>Explore</h2>
          </div>

          <!-- Explore posts injected here by JS -->
          <div id="explore-posts" class="posts-list">
            <div class="loading-state">Loading…</div>
          </div>
        </div>
        <!-- END VIEW: EXPLORE -->

        <!-- ── VIEW: PROFILE ───────────────────────────────────── -->
        <div id="view-profile" class="view">
          <!-- Profile header injected by JS (avatar, bio, stats, follow btn) -->
          <div id="profile-header" class="profile-header"></div>

          <!-- Tab switcher: Posts / Followers / Following -->
          <div class="profile-tabs">
            <button class="profile-tab active" data-tab="posts">Posts</button>
            <button class="profile-tab" data-tab="followers">Followers</button>
            <button class="profile-tab" data-tab="following">Following</button>
          </div>

          <!-- Tab content panels — JS shows/hides these -->
          <div id="profile-posts" class="posts-list"></div>
          <div id="profile-followers" class="users-list hidden"></div>
          <div id="profile-following" class="users-list hidden"></div>
        </div>
        <!-- END VIEW: PROFILE -->
      </main>
      <!-- END MAIN CONTENT -->
    </div>
    <!-- END APP SCREEN -->

    <!-- ============================================================
     POST DETAIL MODAL
     Opens when user clicks a post — shows full post + comments
============================================================ -->
    <div id="post-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <button class="modal-close" id="modal-close">✕</button>

        <!-- Full post card injected here by JS -->
        <div id="modal-post-content"></div>

        <!-- Comments section -->
        <div class="comments-section">
          <h4>Comments</h4>

          <!-- Comment list injected by JS -->
          <div id="modal-comments" class="comments-list"></div>

          <!-- Comment compose — hidden if not logged in -->
          <div class="comment-compose" id="comment-compose-area">
            <input
              type="text"
              id="comment-input"
              placeholder="Add a comment…"
              maxlength="300"
              autocomplete="off"
            />
            <button id="comment-submit" class="btn-primary btn-sm">Post</button>
          </div>
        </div>
      </div>
    </div>
    <!-- END POST MODAL -->

    <!-- ============================================================
     EDIT PROFILE MODAL
     Opens when user clicks "Edit Profile" on their own profile
============================================================ -->
    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal-card modal-sm">
        <button class="modal-close" id="edit-modal-close">✕</button>
        <h3 class="modal-title">Edit Profile</h3>

        <div class="field-group">
          <label for="edit-bio">Bio</label>
          <textarea
            id="edit-bio"
            placeholder="Tell people about yourself…"
            maxlength="200"
            rows="3"
          ></textarea>
        </div>

        <div class="field-group">
          <label for="edit-avatar">Avatar URL</label>
          <input
            type="url"
            id="edit-avatar"
            placeholder="https://example.com/your-photo.jpg"
          />
        </div>

        <div id="edit-error" class="form-error hidden"></div>

        <button id="edit-save" class="btn-primary btn-full">
          Save Changes
        </button>
      </div>
    </div>
    <!-- END EDIT MODAL -->

    <!-- ============================================================
     TOAST NOTIFICATION
     JS adds class "show" to display it, removes after 2.5s
============================================================ -->
    <div id="toast" class="toast hidden"></div>

    <!-- ============================================================
     SCRIPTS — ORDER MATTERS
     api.js must load before components.js
     components.js must load before app.js
============================================================ -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
